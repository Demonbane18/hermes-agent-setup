# =============================================================================
# Work Agent — Hermes Gateway config
# =============================================================================
# Safe to commit. The Telegram bot token gets injected into platforms.telegram
# at startup by inject_config.py — DO NOT paste tokens here directly.
# =============================================================================

model:
  default: mimo-v2.5-pro
  provider: custom:xiaomi-mimo
  api_mode: chat_completions
  fallback_providers:
    - provider: openrouter
      model: minimax/minimax-m2.7

custom_providers:
  - name: xiaomi-mimo
    base_url: https://token-plan-sgp.xiaomimimo.com/v1   # use ams or cn if your dashboard says so
    key_env: XIAOMI_MIMO_API_KEY

providers: {}

auxiliary:
  compression:
    provider: custom:xiaomi-mimo
    model: mimo-v2-flash
  title_generation:
    provider: custom:xiaomi-mimo
    model: mimo-v2-flash

agent:
  max_turns: 90
  gateway_timeout: 1800           # 30 minutes per turn
  restart_drain_timeout: 60
  service_tier: ''
  tool_use_enforcement: auto
  gateway_timeout_warning: 900
  gateway_notify_interval: 600
  verbose: false
  reasoning_effort: medium
  system_prompt: ''                # leave empty — HERMES_EPHEMERAL_SYSTEM_PROMPT in .env wins

platforms:
  telegram:
    enabled: true
    token: ''                      # injected by inject_config.py at startup
    extra:
      require_pairing: false

platform_toolsets:
  cli:
    - hermes-cli
  telegram:
    - hermes-telegram

sessions_dir: ./sessions

session_reset:
  mode: both
  idle_minutes: 1440               # auto-reset session after 24h idle
  at_hour: 4                       # …or daily at 04:00 local time

streaming:
  enabled: false

approvals:
  mode: manual
  timeout: 60
  cron_mode: deny

command_allowlist: []
quick_commands: {}
hooks: {}
hooks_auto_accept: false

privacy:
  redact_pii: false

cron:
  wrap_response: true
  max_parallel_jobs: null

code_execution:
  mode: project
  timeout: 300
  max_tool_calls: 50

logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3

network:
  force_ipv4: false

_config_version: 22
group_sessions_per_user: true

# Set this to your own Telegram chat ID if you want the bot to post home-channel
# notifications (cron summaries, errors, etc.). Leave blank to disable.
TELEGRAM_HOME_CHANNEL: ''
